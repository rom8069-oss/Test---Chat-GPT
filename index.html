<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Territory Planner Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="toolbar">
<input type="file" id="fileInput">

<button id="lassoBtn">Lasso</button>
<button id="assignBtn">Assign</button>
<button id="optimizeBtn">Optimize</button>

<button id="undoBtn">Undo</button>
<button id="exportBtn">Export</button>

<label>Stops</label>
<input id="stopWeight" type="number" value="60">
<label>Revenue</label>
<input id="revWeight" type="number" value="30">
<label>Distance</label>
<input id="distWeight" type="number" value="10">

<label>Disruption</label>
<input id="disruption" type="range" min="0" max="100" value="70">

<button id="heatToggle">Heatmap</button>
<button id="mapStyleToggle">Dark/Light</button>

<span id="statusIndicators">
Moved: <span id="movedCount">0</span> | Revenue: $<span id="totalRevenue">0</span> | Stops: <span id="totalStops">0</span>
</span>
</div>

<div id="container">
<div id="map"></div>

<div id="sidePanel">
<div class="panelSection">
<h3>Account Detail</h3>
<div id="accountDetail"></div>
</div>

<div class="panelSection">
<h3>Rep Dashboard</h3>
<div id="repStats"></div>
</div>
</div>
</div>

<script src="optimizer.js"></script>
<script src="app.js"></script>
</body>
</html>
